# devmenu — example project overlay (YAML)
#
# This file merges with built-in "Git" and "General" categories from the tool.
# - New category names add a full category.
# - Same name as a built-in (case-insensitive) appends commands to that category.
#
# Discovery: walk upward from cwd; first directory that contains any of:
#   devmenu.yaml, devmenu.yml, .devmenu.yaml, .devmenu.yml, devmenu.json, .devmenu.json
# If both YAML and JSON exist in that directory, YAML is used (first match in the list above).
#
# Command fields:
#   label        (string, required)  — list label
#   command      (string, required) — shell command; {{inputName}} substituted from inputs
#   description  (string, optional) — details panel
#   cwd          (string, optional) — working dir relative to config root or absolute
#   tags         (string[], optional) — only used for search (s), not shown in lists
#   confirm      (bool, optional)   — ask before run
#   confirmText  (string, optional) — custom confirm message
#   inputs       (array, optional)  — each: name (required), label, placeholder, default,
#                                     required, multiline
#
categories:
  - name: Scripts
    commands:
      - label: Install deps
        description: Install project dependencies with Bun.
        command: bun install
      - label: Typecheck
        description: Run TypeScript type checks without emitting files.
        command: bun run typecheck
      - label: Git commit
        description: Create a commit with subject/body prompts.
        command: git commit -m "{{subject}}" -m "{{body}}"
        inputs:
          - name: subject
            label: Commit subject
            placeholder: "feat: short summary"
            required: true
          - name: body
            label: Commit body
            placeholder: Explain what changed and why
            multiline: true
        confirm: true
        confirmText: Create commit with the entered message?
        tags: [git, commit]
