# Publish to npm when you push a version tag (e.g. v0.1.0).
#
# NPM_TOKEN must be a token npm allows for publish with 2FA on the account:
#   • Granular: Packages → Read/write for this package, or
#   • Classic → "Automation" (CI; bypasses interactive 2FA for publish).
# A read-only or "Publish" token without bypass will fail with E403.

name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    # Note: `secrets` cannot be used in job-level `if` (GitHub rejects the workflow).
    # Set repository secret NPM_TOKEN or the final `npm publish` step will fail.
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      # Avoid setup-node registry-url (it sets deprecated always-auth in .npmrc).
      - name: npm auth for publish
        run: echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: bun install --frozen-lockfile

      - run: bun run check

      - run: bun run typecheck

      - run: bun run build

      - run: node ./cli.js --help

      - run: npm publish --access public
