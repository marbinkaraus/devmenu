# Creates/updates a "Release PR" from conventional commits on main.
# When the PR is merged, release-please tags the release and creates a
# GitHub release — the tag then triggers publish.yml for npm.
#
# Use RELEASE_PLEASE_TOKEN (fine-grained or classic PAT with contents + PRs)
# so the tag/release is not attributed to GITHUB_TOKEN. Pushes from
# GITHUB_TOKEN do not start other workflows, so publish.yml would never run.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT when set; otherwise release PRs still work but tag won't trigger publish.yml
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
