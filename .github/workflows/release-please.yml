# Creates/updates a "Release PR" from conventional commits on main.
# When the PR is merged, release-please tags the release and creates a
# GitHub release — the tag then triggers publish.yml for npm.

name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
